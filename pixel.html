<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>christine y lee — pixel</title>
  <link rel="stylesheet" type="text/css" href="index.css">
  <link rel="stylesheet" type="text/css" href="pixel.css">
  <script defer src="https://code.jquery.com/jquery-4.0.0.slim.min.js"></script>
  <script defer src="pixel.js"></script>
</head>
<body>
  <div class="main">
    <input type="file" id="imageInput" accept="image/*" />
    <p id="imageDimensions" class="image-dimensions" aria-live="polite"></p>
    <p class="draw-hint">Drag on the canvas to draw a rectangle (image must be loaded first).</p>
    <button type="button" id="cycleOrigin" class="origin-cycle" disabled>
      Origin: top-left
    </button>
    <canvas id="pixelCanvas" tabindex="0" aria-label="Image and rectangle overlay"></canvas>
    <pre id="rectVertices" class="rect-vertices" aria-live="polite"></pre>
  </div>
</body>
</html>
