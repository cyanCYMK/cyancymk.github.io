<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>christine y lee — flashcard</title>
  <link rel="stylesheet" type="text/css" href="../index.css">
  <link rel="stylesheet" type="text/css" href="flashcard.css">
  <script defer src="https://code.jquery.com/jquery-4.0.0.slim.min.js"></script>
  <script defer src="data.js"></script>
  <script defer src="flashcard.js"></script>
</head>
<body>
  <div class="main">
    <h1>Flashcard</h1>
    <div class="flashcard-scene">
      <div class="flashcard-inner" id="flashcard" aria-live="polite">
        <div class="flashcard-face flashcard-front" id="flashcard-front"></div>
        <div class="flashcard-face flashcard-back" id="flashcard-back"></div>
      </div>
    </div>
    <form class="flashcard-form">
      <textarea id="answer" rows="4" cols="40" placeholder="Answer here"></textarea>
      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
